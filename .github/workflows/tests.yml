name: Rule tests

# Every push runs the Phase 3 rule tests (pure logic + real validated
# fixtures) PLUS the drill-through reconciliation audit (read-only queries
# against the live DB: every chart->card measure mapping must count exactly
# what the scorecard counts — see tests/test_drill_reconciles.py). A red X
# here means a dedup/attribution rule regressed, or a chart definition and
# its drill map drifted apart.

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r ingestion/requirements.txt pytest
      - env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m pytest tests/ -q
