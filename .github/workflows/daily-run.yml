name: Daily activity sync

# The daily job for the CA Activity Visibility project.
# Wakes up once a day and copies recent activity (yesterday + a lookback sweep
# for late-arriving records) from AmpleMarket + HubSpot into the Supabase
# landing tables, logging a summary per day per source.

on:
  schedule:
    # Runs every day at 06:17 UTC. (Times in GitHub cron are always UTC.)
    # Deliberately OFF the top of the hour: GitHub's scheduled runs are
    # best-effort and get delayed/dropped under load, which peaks at :00.
    # "0 6" was landing ~5h late every day (observed 2026-07-17..19); an
    # off-hour minute meaningfully reduces the delay/skip odds (GitHub's own
    # guidance). If a run is still missing hours later, trigger manually.
    - cron: "17 6 * * *"
  # Lets us press a button to run it on demand (optionally for a specific date).
  workflow_dispatch:
    inputs:
      date:
        description: "Day to copy (YYYY-MM-DD, UTC). Leave blank for the normal lookback sweep."
        required: false
        default: ""

# Never run two ingestions at once (e.g. a manual run overlapping the 6am
# cron) — the second waits instead of interleaving writes.
concurrency:
  group: daily-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    # 120 min of headroom: a full 5-day sweep + entity sync + resolve + model
    # needs ~35-40 min, but HubSpot's nightly "Today's Date" workflow re-stamps
    # ALL ~152k companies at ~03:00 UTC, so the company mirror re-pulls the whole
    # table (~20 min) every night (see decisions.md 2026-07-16). 30 min was too
    # tight and cancelled the run mid-company-sync. Still bounded so a genuine
    # hang can't sit for hours.
    timeout-minutes: 120
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r ingestion/requirements.txt

      - name: Run daily ingestion
        env:
          AMPLEMARKET_API_KEY: ${{ secrets.AMPLEMARKET_API_KEY }}
          HUBSPOT_PRIVATE_APP_TOKEN: ${{ secrets.HUBSPOT_PRIVATE_APP_TOKEN }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python ingestion/ingest.py ${{ github.event.inputs.date }}

      # Phase 2: rebuild the resolved identities from the fresh raw layer.
      # Runs even if ingestion partially failed (yesterday's raw data still
      # deserves fresh identities); its own guard rails abort on a bad roster.
      - name: Rebuild identities
        if: always()
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python identity/resolve.py

      # Phase 3: apply any new schema migrations, then rebuild the unified
      # activity model (fact table + flat view) from raw + identities.
      - name: Apply schema migrations
        if: always()
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python migrations/apply.py

      - name: Rebuild activity model
        if: always()
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python model/build_activity.py
