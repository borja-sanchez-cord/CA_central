name: Daily activity sync

# The daily job for the CA Activity Visibility project.
# Wakes up once a day, copies the previous day's activity from AmpleMarket +
# HubSpot into the Supabase landing tables, and logs a summary.

on:
  schedule:
    # Runs every day at 06:00 UTC. (Times in GitHub cron are always UTC.)
    - cron: "0 6 * * *"
  # Lets us press a button to run it on demand (optionally for a specific date).
  workflow_dispatch:
    inputs:
      date:
        description: "Day to copy (YYYY-MM-DD, UTC). Leave blank for yesterday."
        required: false
        default: ""

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r ingestion/requirements.txt

      - name: Run daily ingestion
        env:
          AMPLEMARKET_API_KEY: ${{ secrets.AMPLEMARKET_API_KEY }}
          HUBSPOT_PRIVATE_APP_TOKEN: ${{ secrets.HUBSPOT_PRIVATE_APP_TOKEN }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python ingestion/ingest.py ${{ github.event.inputs.date }}
